# Nginx config for admin.nutrify-app.web.id
# Place at: /etc/nginx/sites-available/admin.nutrify-app.web.id
# Enable: ln -s /etc/nginx/sites-available/admin.nutrify-app.web.id /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name admin.nutrify-app.web.id;

    root /var/www/nutrify-admin/public;
    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Admin panel — no API endpoints
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Deny access to sensitive files
    location ~* \.(env|log|git|htaccess|htpasswd)$ {
        deny all;
    }
}
