name: nutrify
description: A flutter boilerplate project created using MobX and Provider,Pengujian tertutup.

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# Read more about versioning at semver.org.
version: 1.0.0+5

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # A
  another_flushbar: ^1.12.29
  # B
  # C
  cupertino_icons: ^1.0.5
  # D
  dio: ^5.1.1
  # E
  event_bus: ^2.0.0
  # F
  flutter_mobx: ^2.0.6+5
  # G
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  google_sign_in: ^6.1.0
  # H
  http: ^1.5.0
  # I
  intl: 0.20.2
  # J
  json_annotation: ^4.11.0
  json_serializable: ^6.13.0
  # K
  # L
  # M
  mobx: ^2.1.4
  # N
  # O
  # P
  path_provider: ^2.0.14
  # Q
  # R
  shimmer: ^3.0.0
  shared_preferences: ^2.1.0
  flutter_animate: ^4.5.0
  sembast_web: ^2.4.4
  sembast: ^3.4.4
  # T
  # U
  # V
  validators: ^3.0.0
  # W
  # X
  xxtea: ^2.1.0
  fluid_bottom_nav_bar: ^1.4.0
  # (belum digunakan) image_picker: ^1.2.1
  supabase_flutter: ^2.9.0
  flutter_dotenv: ^6.0.0
  image_picker: ^1.2.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  permission_handler: ^12.0.1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  image_cropper: ^12.2.1
  # Y
  # z

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The following adds the launcher icon support to your application.
  # run below mentioned commands to generate launcher icons
  # flutter packages get
  # flutter packages pub run flutter_launcher_icons:main
  flutter_launcher_icons: ^0.14.4
  mobx_codegen: ^2.7.6
  build_runner: ^2.11.1
  flutter_lints: ^6.0.0
  analyzer: '>=9.0.0 <11.0.0'
  mocktail: ^1.0.5

flutter_icons:
  image_path: "assets/images/nutrify-logo.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/lang/

  fonts:
    - family: ProductSans
      fonts:
        - asset: assets/fonts/Product-Sans-Regular.ttf
        - asset: assets/fonts/Product-Sans-Italic.ttf
          style: italic
        - asset: assets/fonts/Product-Sans-Bold.ttf
          weight: 700
